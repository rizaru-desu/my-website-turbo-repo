<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixelated Bolt with Depth -->
  <!-- Highlights (Top/Left) -->
  <rect x="11" y="2" width="3" height="1" fill="white" fill-opacity="0.3" />
  <rect x="11" y="2" width="1" height="3" fill="white" fill-opacity="0.3" />
  
  <!-- Base Bolt -->
  <rect x="11" y="3" width="3" height="2" fill="#bd93f9" />
  <rect x="10" y="3" width="3" height="3" fill="#bd93f9" />
  <rect x="9" y="4" width="3" height="3" fill="#bd93f9" />
  <rect x="8" y="5" width="3" height="3" fill="#bd93f9" />
  <rect x="7" y="6" width="3" height="3" fill="#bd93f9" />
  <rect x="6" y="7" width="3" height="3" fill="#bd93f9" />
  <rect x="5" y="8" width="3" height="3" fill="#bd93f9" />
  <rect x="4" y="9" width="3" height="3" fill="#bd93f9" />
  
  <rect x="2" y="10" width="4" height="3" fill="#ff79c6" />
  <rect x="3" y="13" width="2" height="2" fill="#8be9fd" />

  <!-- Shadows (Bottom/Right) -->
  <rect x="11" y="4" width="3" height="1" fill="black" fill-opacity="0.2" />
  <rect x="13" y="2" width="1" height="3" fill="black" fill-opacity="0.2" />
  <rect x="2" y="12" width="4" height="1" fill="black" fill-opacity="0.2" />
  <rect x="3" y="14" width="2" height="1" fill="black" fill-opacity="0.2" />
</svg>